<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            color: #ff4d6d;
        }

        p {
            color: #555;
        }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #e63956;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Olá! 👋</h1>
    <p>Esta é uma página HTML criada por ChatGPT.</p>
    <button onclick="mostrarMensagem()">Clique aqui</button>
</div>

<script>
function mostrarMensagem() {
    alert("Obrigado por clicar! 😊");
}
</script>

</body>
</html>
